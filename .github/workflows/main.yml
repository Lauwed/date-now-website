name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
permissions:
  contents: read
  issues: read
  pull-requests: write
on:
  pull_request_target:
    types: [opened, reopened]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: anti-slop
        uses: peakoss/anti-slop@v0.2.1
